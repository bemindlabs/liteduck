name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  # ── Same bar as local pre-commit + CI: block expensive matrix if checks fail ─
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-qg-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-qg-
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config

      - name: Verify version fields match (tag / package / Tauri / Cargo)
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"//;s/".*//')
          TAURI_VER=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"//;s/".*//')
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | sed 's/.*= *"//;s/".*//')
          if [ "$PKG_VER" != "$TAURI_VER" ] || [ "$PKG_VER" != "$CARGO_VER" ]; then
            echo "Version mismatch: package.json=$PKG_VER tauri.conf.json=$TAURI_VER Cargo.toml=$CARGO_VER"
            exit 1
          fi
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "Tag version ($TAG_VER) does not match config version ($PKG_VER)"
            exit 1
          fi
          echo "Versions aligned at $PKG_VER (tag: v$TAG_VER)"

      - name: Run quality gate (tsc, format, lint, vitest+coverage, Rust)
        run: npm run quality-gate

  # ── Build on each platform ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: quality-gate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      # Required: job-level permissions replace workflow defaults; rust-cache needs Actions cache API
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          # macOS Intel
          - platform: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          # macOS-only for now. Windows & Linux build jobs are deferred (planned);
          # re-add windows-latest / ubuntu-latest matrix entries when those ship.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Node / frontend ───────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      # ── macOS code signing ────────────────────────────────────────────────────
      # Requires secrets:
      #   APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12
      #   APPLE_CERTIFICATE_PASSWORD — password for the .p12
      #   APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: Pituk Kaewsuksai (944QFC9G5N)"
      #   KEYCHAIN_PASSWORD          — arbitrary password for the ephemeral keychain
      - name: Import macOS code signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      # ── macOS notarization keychain profile ───────────────────────────────────
      # Stores Apple ID credentials as a named notarytool profile so that
      # tauri-action can call `xcrun notarytool` without plain-text passwords.
      # Requires secrets:
      #   APPLE_ID           — Apple ID email used for notarization
      #   APPLE_ID_PASSWORD  — app-specific password (not Apple ID password)
      #   APPLE_TEAM_ID      — e.g. "944QFC9G5N"
      - name: Store notarization credentials in keychain profile
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No Apple ID configured, skipping notarization setup"
            exit 0
          fi
          xcrun notarytool store-credentials "liteduck-notarize" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      # ── Conditionally export signing env vars ───────────────────────────────
      # Secrets that resolve to empty strings must NOT be set as env vars,
      # otherwise Tauri attempts codesign with identity "" and fails.
      # Writing to GITHUB_ENV ensures the var is truly absent when the secret
      # is not configured.
      - name: Set signing environment (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          if [ -n "$_CERT" ] && [ -n "$_SIGNING_ID" ]; then
            echo "APPLE_SIGNING_IDENTITY=$_SIGNING_ID" >> "$GITHUB_ENV"
          else
            echo "No certificate or signing identity configured, skipping code signing"
          fi
          if [ -n "$_CERT" ] && [ -n "$_APPLE_ID" ]; then
            echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID_PASSWORD=$_APPLE_ID_PWD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$_APPLE_TEAM" >> "$GITHUB_ENV"
          fi
        env:
          _CERT: ${{ secrets.APPLE_CERTIFICATE }}
          _SIGNING_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_ID_PWD: ${{ secrets.APPLE_ID_PASSWORD }}
          _APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      # ── Build & sign & notarize ───────────────────────────────────────────────
      # tauri-action calls `cargo tauri build` which:
      #   - On macOS: signs bundles using the keychain identity imported above,
      #     then submits the .dmg to Apple for notarization via the stored profile
      #     when APPLE_ID / APPLE_TEAM_ID env vars are present.
      #   - On Windows: signs the MSI/NSIS installer when WINDOWS_CERTIFICATE is set.
      #   - Produces latest.json (updater manifest) because includeUpdaterJson=true.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LiteDuck ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/bemindlabs/openclaw-loop-duck-app/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      # ── macOS: verify notarization ────────────────────────────────────────────
      - name: Verify notarization (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Apple notarization/signing is not fully configured, skipping notarization verification"
            exit 0
          fi
          for dmg in src-tauri/target/*/release/bundle/dmg/*.dmg; do
            echo "Verifying: $dmg"
            spctl --assess --type open --context context:primary-signature --ignore-cache -v "$dmg"
          done

  # ── Publish the draft release ───────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: false
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Mirror assets to public releases repo ─────────────────────────────────
  public-release:
    name: Public Release
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # macOS-only for now: mirror the DMGs and updater tarballs.
          gh release download "${{ github.ref_name }}" \
            --repo bemindlabs/openclaw-loop-duck-app \
            --dir artifacts \
            --pattern "*.dmg" \
            --pattern "*.tar.gz"

      - name: Create public release with assets
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Create or update the release on the public repo
          gh release create "$TAG" \
            --repo bemindlabs/liteduck-releases \
            --title "LiteDuck $TAG" \
            --notes "Download LiteDuck $TAG for your platform. See [CHANGELOG](https://github.com/bemindlabs/liteduck-releases/blob/main/CHANGELOG.md) for details." \
            artifacts/* \
            || gh release upload "$TAG" \
              --repo bemindlabs/liteduck-releases \
              --clobber \
              artifacts/*

  # ── Update Homebrew cask ──────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Cask
    needs: public-release
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS DMGs and update cask
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Download both architecture DMGs from the public releases repo
          gh release download "$TAG" \
            --repo bemindlabs/liteduck-releases \
            --pattern "LiteDuck_${VERSION}_aarch64.dmg" \
            --pattern "LiteDuck_${VERSION}_x64.dmg" \
            --dir .

          # Compute SHA-256 for each architecture
          SHA256_ARM=$(shasum -a 256 "LiteDuck_${VERSION}_aarch64.dmg" | awk '{print $1}')
          SHA256_INTEL=$(shasum -a 256 "LiteDuck_${VERSION}_x64.dmg" | awk '{print $1}')

          # Clone the Homebrew tap
          git clone "https://x-access-token:${GH_TOKEN}@github.com/bemindlabs/homebrew-liteduck.git" tap
          cd tap

          # Update the cask formula (dual-arch: Apple Silicon + Intel)
          cat > Casks/liteduck.rb << 'CASK_EOF'
          cask "liteduck" do
            arch arm: "aarch64", intel: "x64"

            version "VERSION_PLACEHOLDER"
            sha256 arm:   "SHA256_ARM_PLACEHOLDER",
                   intel: "SHA256_INTEL_PLACEHOLDER"

            url "https://github.com/bemindlabs/liteduck-releases/releases/download/v#{version}/LiteDuck_#{version}_#{arch}.dmg"
            name "LiteDuck"
            desc "Lightweight code editor with file browser, terminal, and Git"
            homepage "https://buildonclaw.cloud/products/liteduck"

            depends_on macos: ">= :ventura"

            app "LiteDuck.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/LiteDuck.app"],
                             sudo: true
            end

            zap trash: [
              "~/Library/Application Support/com.bemindlabs.liteduck",
              "~/Library/Caches/com.bemindlabs.liteduck",
              "~/Library/Preferences/com.bemindlabs.liteduck.plist",
              "~/Library/Saved Application State/com.bemindlabs.liteduck.savedState",
            ]
          end
          CASK_EOF

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Casks/liteduck.rb
          sed -i "s/SHA256_ARM_PLACEHOLDER/${SHA256_ARM}/g" Casks/liteduck.rb
          sed -i "s/SHA256_INTEL_PLACEHOLDER/${SHA256_INTEL}/g" Casks/liteduck.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Casks/liteduck.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/liteduck.rb
          git commit -m "Update LiteDuck to ${VERSION}"
          git push
