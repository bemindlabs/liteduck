name: Security Scan

# RULE (bemindlabs): every project must pass Semgrep (SAST) + Trivy (VA: deps/secrets/IaC)
# before going to production. Required gate on main + PRs, and callable (workflow_call) so
# deploy/release workflows can depend on it.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: pipx install semgrep || pip install --user semgrep
      - name: Semgrep scan (fail on ERROR findings)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --error --severity ERROR

  trivy:
    name: Trivy VA (deps · secrets · IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Trivy VA scan (fail on HIGH/CRITICAL)
        run: |
          trivy fs --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 .
