name: Auto Release

# Turns a version bump into a release with no manual tagging.
#
# Trigger: a push to `main` that touches package.json (i.e. a version bump),
# or a manual run via the Actions tab (workflow_dispatch).
#
# What it does: reads the version from package.json, asserts that
# package.json / src-tauri/tauri.conf.json / src-tauri/Cargo.toml all agree,
# and — if the tag v<version> does not already exist — creates and pushes it.
# Pushing the tag is what triggers the existing release.yml pipeline.
#
# IMPORTANT — why RELEASE_PAT and not GITHUB_TOKEN:
#   GitHub deliberately does NOT re-trigger workflows for events caused by the
#   default GITHUB_TOKEN. A tag pushed with GITHUB_TOKEN would be a no-op for
#   release.yml. We therefore check out and push the tag using a dedicated
#   Personal Access Token stored as the `RELEASE_PAT` secret, whose push DOES
#   trigger release.yml. See docs/RELEASING.md for how to mint RELEASE_PAT.
#
# Idempotent: if v<version> already exists (locally or on origin), the job
# exits cleanly without creating or pushing anything.

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch:

concurrency:
  group: auto-release
  cancel-in-progress: false

# The job's own GITHUB_TOKEN is read-only here: the tag is pushed with
# RELEASE_PAT (configured on actions/checkout below), not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  tag:
    name: Tag version bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with RELEASE_PAT so the tag push triggers release.yml)
        uses: actions/checkout@v6
        with:
          # Full history + tags so we can reliably detect an existing tag.
          fetch-depth: 0
          # Authenticate the remote with the PAT. A tag pushed under this token
          # is treated as a user push and WILL trigger release.yml.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version and verify all three sources agree
        id: version
        run: |
          set -euo pipefail

          PKG_VER=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"//;s/".*//')
          TAURI_VER=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"//;s/".*//')
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*= *"//;s/".*//')

          if [ -z "$PKG_VER" ]; then
            echo "::error::Could not read version from package.json"
            exit 1
          fi
          if [ "$PKG_VER" != "$TAURI_VER" ] || [ "$PKG_VER" != "$CARGO_VER" ]; then
            echo "::error::Version mismatch — package.json=$PKG_VER tauri.conf.json=$TAURI_VER Cargo.toml=$CARGO_VER"
            exit 1
          fi

          echo "Versions aligned at $PKG_VER"
          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (idempotent — skips if it already exists)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          TAG="v${VERSION}"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally — nothing to do."
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          echo "Pushed ${TAG} — release.yml will now run for this tag."
